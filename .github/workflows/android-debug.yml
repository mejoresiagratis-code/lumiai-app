name: Android Debug Build

on:
  push:
    branches: [ main ]
    paths-ignore: [ 'docs/**', '**/*.md', 'LICENSE' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ 'docs/**', '**/*.md', 'LICENSE' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 3

  quality:
    name: Quality (no bloqueante)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Download ktlint 1.7.0
        continue-on-error: true
        run: |
          curl -sSLo ktlint https://github.com/pinterest/ktlint/releases/download/1.7.0/ktlint
          chmod +x ktlint

      - name: ktlint (solo informe)
        continue-on-error: true
        run: ./ktlint "app/src/**/*.kt" --reporter=plain --relative

      - name: Android Lint (solo informe)
        continue-on-error: true
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.*
          if-no-files-found: warn
          retention-days: 3
